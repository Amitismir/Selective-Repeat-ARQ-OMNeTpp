[General]
network = SRNetwork
sim-time-limit = 100s

# Timeout Configuration Analysis:
# Ideal RTT = 2 * Tp + Tx = (2 * 50ms) + 1ms = 101ms.
# To account for software handling, the timer is set to 105ms (0.105s).
**.src.timeout = 0.105s 

# =================================================================
# SECTION 1: ERROR-FREE SCENARIOS (PER = 0.0)
# =================================================================

[Config ErrorFree_W4]
description = "Error-Free Link, Small Window Size (W=4)"
**.src.windowSize = 4
**.dst.windowSize = 4
**.src.out.channel.per = 0.0
**.dst.out.channel.per = 0.0

[Config ErrorFree_W20]
description = "Error-Free Link, Medium Window Size (W=20)"
**.src.windowSize = 20
**.dst.windowSize = 20
**.src.out.channel.per = 0.0
**.dst.out.channel.per = 0.0

[Config ErrorFree_W120]
description = "Error-Free Link, Optimal Saturation Window Size (W=120)"
**.src.windowSize = 120
**.dst.windowSize = 120
**.src.out.channel.per = 0.0
**.dst.out.channel.per = 0.0

